version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PLAYWRIGHT_HEADLESS=true
      - RATE_LIMIT_SECONDS=5.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  test:
    build: .
    environment:
      - APP_ENV=test
      - PLAYWRIGHT_HEADLESS=true
      - RATE_LIMIT_SECONDS=5.0
      - TEST_BASE_URL=http://api:8000
    command: ["pytest", "-v", "tests/"]
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - test
