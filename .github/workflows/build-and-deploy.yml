name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOMAIN_SERVICE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/domain-checker-domain-service
  ORCHESTRATOR_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/domain-checker-kimi-orchestrator
  NEXTJS_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/domain-checker-nextjs-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install orchestrator deps and test
        working-directory: ./kimi-orchestrator
        run: |
          npm ci
          npm test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install domain-service deps and test
        working-directory: ./domain-service
        env:
          TEST_BASE_URL: http://test
        run: |
          pip install -e ".[dev]"
          playwright install firefox
          PYTHONPATH=src pytest -v tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (domain-service)
        id: meta-domain
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOMAIN_SERVICE_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push domain-service
        uses: docker/build-push-action@v6
        with:
          context: ./domain-service
          push: true
          tags: ${{ steps.meta-domain.outputs.tags }}
          labels: ${{ steps.meta-domain.outputs.labels }}
          cache-from: type=gha,scope=domain-service
          cache-to: type=gha,scope=domain-service,mode=max

      - name: Extract metadata (kimi-orchestrator)
        id: meta-orchestrator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ORCHESTRATOR_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push kimi-orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./kimi-orchestrator
          push: true
          tags: ${{ steps.meta-orchestrator.outputs.tags }}
          labels: ${{ steps.meta-orchestrator.outputs.labels }}
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,scope=orchestrator,mode=max

      - name: Extract metadata (nextjs-app)
        id: meta-nextjs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NEXTJS_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push nextjs-app
        uses: docker/build-push-action@v6
        with:
          context: ./nextjs-app
          push: true
          tags: ${{ steps.meta-nextjs.outputs.tags }}
          labels: ${{ steps.meta-nextjs.outputs.labels }}
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,scope=nextjs,mode=max
